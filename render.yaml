databases:
  - name: drt-db
    plan: free
    databaseName: ai_drt_system
    user: drt_user

services:
  - type: web
    name: ai-drt-system
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 2 --timeout 120 app:app
    envVars:
      - key: FLASK_DEBUG
        value: "0"
      - key: DRT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: drt-db
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.12.1"
