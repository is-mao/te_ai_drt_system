<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password - AI DRT System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0d1442 0%, #1a237e 40%, #283593 70%, #3949ab 100%);
        }
        .card {
            max-width: 440px;
            width: 100%;
            border: none;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }
        .card-header {
            background: linear-gradient(135deg, #e65100, #f57c00);
            color: #fff;
            text-align: center;
            padding: 2rem 1.5rem 1.5rem;
        }
        .card-header h4 { margin-bottom: 0.25rem; font-weight: 700; }
        .card-header p { opacity: 0.85; font-size: 0.85rem; margin: 0; }
        .card-body { padding: 2rem; }
        .form-label { font-weight: 600; font-size: 0.82rem; text-transform: uppercase; letter-spacing: 0.3px; }
        .form-control { border-radius: 8px; padding: 0.6rem 0.85rem; }
        .form-control:focus { border-color: #5c6bc0; box-shadow: 0 0 0 3px rgba(92,107,192,0.15); }
        .btn-save { background: linear-gradient(135deg, #1a237e, #283593); border: none; font-weight: 600; padding: 0.65rem; border-radius: 8px; }
        .btn-save:hover { background: linear-gradient(135deg, #0d1442, #1a237e); box-shadow: 0 4px 15px rgba(26,35,126,0.35); }
    </style>
</head>
<body>
    <div class="card">
        <div class="card-header">
            <i class="bi bi-shield-lock" style="font-size:2rem;"></i>
            <h4>Change Password</h4>
            <p>You must change the default password before continuing</p>
        </div>
        <div class="card-body">
            <div class="alert alert-danger" id="errorAlert" style="display:none;" role="alert"></div>
            <div class="alert alert-success" id="successAlert" style="display:none;" role="alert"></div>
            <form id="changePwdForm" novalidate>
                <div class="mb-3">
                    <label for="newPassword" class="form-label">New Password</label>
                    <input type="password" class="form-control" id="newPassword" placeholder="At least 6 characters" required>
                </div>
                <div class="mb-4">
                    <label for="confirmPassword" class="form-label">Confirm Password</label>
                    <input type="password" class="form-control" id="confirmPassword" placeholder="Re-enter new password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-save w-100">
                    <i class="bi bi-check-lg me-1"></i> Set New Password
                </button>
            </form>
        </div>
    </div>
    <script>
        document.getElementById('changePwdForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            var errEl = document.getElementById('errorAlert');
            var okEl = document.getElementById('successAlert');
            errEl.style.display = 'none';
            okEl.style.display = 'none';

            var np = document.getElementById('newPassword').value;
            var cp = document.getElementById('confirmPassword').value;

            if (np.length < 6) { errEl.textContent = 'Password must be at least 6 characters'; errEl.style.display = 'block'; return; }
            if (np !== cp) { errEl.textContent = 'Passwords do not match'; errEl.style.display = 'block'; return; }

            try {
                var resp = await fetch('/api/auth/change-password', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ new_password: np, confirm_password: cp })
                });
                var data = await resp.json();
                if (data.success) {
                    okEl.textContent = 'Password changed! Redirecting...';
                    okEl.style.display = 'block';
                    setTimeout(function(){ window.location.href = '/dashboard'; }, 1000);
                } else {
                    errEl.textContent = data.error || 'Failed to change password';
                    errEl.style.display = 'block';
                }
            } catch(err) {
                errEl.textContent = 'Server error. Please try again.';
                errEl.style.display = 'block';
            }
        });
    </script>
</body>
</html>
